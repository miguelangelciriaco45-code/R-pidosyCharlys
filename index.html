<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Rápidos y Charlys 3D Deluxe</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial, sans-serif; 
  background:#000;
  /* Desactiva selección de texto y gestos de zoom accidentales en móvil */
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}
#menu,#gameover{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(17,17,17,0.95);color:#fff;z-index:20;text-align:center;}
#gameover{display:none}
#hud{position:absolute;top:10px;left:10px;color:#fff;background:rgba(0,0,0,.7);padding:15px;border-radius:8px;z-index:10;font-size:18px;line-height:1.5;}
#mobile{position:absolute;bottom:25px;width:100%;display:flex;justify-content:center;gap:25px;z-index:10}

/* Botones móviles arreglados para evitar menús contextuales y selección */
.btn-control{
  padding: 22px 38px; 
  font-size: 28px; 
  background: rgba(255,255,255,0.25); 
  border: 3px solid #fff; 
  color: white; 
  border-radius: 15px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none; /* Evita que salga "Copiar/Compartir" en iOS */
}
.btn-control:active {
  background: rgba(255,255,255,0.5);
}

select, input, button{padding:10px 20px; margin: 8px; border-radius: 5px; border: none; font-size: 16px;}
button{background: #28a745; color: white; font-weight: bold; cursor: pointer; transition: 0.2s;}
button:hover{background: #218838;}
.opcion-contenedor{background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin-bottom: 15px; width: 280px;}
</style>
</head>
<body>

<div id="menu">
<h1>🏍️ Rápidos y Charlys 3D Deluxe</h1>

<div class="opcion-contenedor">
  <label for="mapa">🌅 Entorno:</label><br>
  <select id="mapa">
    <option value="dia">Mapa Día</option>
    <option value="noche">Mapa Noche</option>
  </select>
</div>

<div class="opcion-contenedor">
  <label for="colorCarro">🚗 Color de tu Auto:</label><br>
  <select id="colorCarro">
    <option value="0xff0000">Rojo Racing</option>
    <option value="0x0044ff">Azul Nitro</option>
    <option value="0x00ff44">Verde Krypton</option>
    <option value="0xffcc00">Amarillo Avispa</option>
  </select>
</div>

<div class="opcion-contenedor">
  <label for="mp3">🎵 Tu música (Opcional):</label><br>
  <input type="file" id="mp3" accept="audio/*">
</div>

<button onclick="startGame()">¡INICIAR CARRERA!</button>
<p style="font-size:12px; color:#aaa;">Multijugador por código: DEMO-001 (demostración local)</p>
</div>

<div id="hud">
<div>🏆 Récord: <span id="record">0</span></div>
<div>🎯 Puntos: <span id="pts">0</span></div>
<div>❤️ Vidas: <span id="lives">3</span></div>
</div>

<div id="gameover">
<h1 style="color: #ff3333; font-size: 45px;">💥 ¡FIN DEL JUEGO! 💥</h1>
<p id="motivoMuerte" style="font-size: 20px;"></p>
<p style="font-size: 24px;">Puntuación final: <span id="ptsFinal">0</span></p>
<button onclick="reiniciarJuego()">Volver a intentar</button>
</div>

<div id="mobile">
<button id="left" class="btn-control">⬅️</button>
<button id="up" class="btn-control">🚀</button>
<button id="right" class="btn-control">➡️</button>
</div>

<script>
// Evitar menús contextuales en todo el juego (clic largo / click derecho)
window.addEventListener('contextmenu', e => e.preventDefault());

let audio = new Audio();
audio.loop = true;

document.getElementById('mp3').addEventListener('change', e => {
 const f = e.target.files[0];
 if(f) audio.src = URL.createObjectURL(f);
});

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 5000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const lightAmbient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(lightAmbient);
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(50, 100, 20);
scene.add(sun);

const roadWidth = 60;
const road = new THREE.Mesh(
 new THREE.PlaneGeometry(roadWidth, 6000),
 new THREE.MeshStandardMaterial({color: 0x222222, roughness: 0.8})
);
road.rotation.x = -Math.PI/2;
scene.add(road);

const grass = new THREE.Mesh(
 new THREE.PlaneGeometry(2000, 6000),
 new THREE.MeshStandardMaterial({color: 0x153d15, roughness: 0.9})
);
grass.rotation.x = -Math.PI/2;
grass.position.y = -0.05;
scene.add(grass);

for(let z=-3000; z<100; z+=60){
 [-45, 45].forEach(x => {
   const h = 15 + Math.random()*50;
   const b = new THREE.Mesh(
    new THREE.BoxGeometry(18, h, 18),
    new THREE.MeshStandardMaterial({color: 0x44444c, roughness: 0.5})
   );
   b.position.set(x, h/2, z);
   scene.add(b);
 });
}

for(let i=0; i<40; i++){
 const c = new THREE.Mesh(
  new THREE.SphereGeometry(6, 8, 8),
  new THREE.MeshStandardMaterial({color: 0xffffff, roughness: 1})
 );
 c.position.set((Math.random()*300)-150, 60+Math.random()*20, -Math.random()*3000);
 scene.add(c);
}

function crearVehiculo(colorCarro) {
  const cocheGrupo = new THREE.Group();

  const chasis = new THREE.Mesh(
    new THREE.BoxGeometry(2.4, 0.6, 4.5),
    new THREE.MeshStandardMaterial({color: colorCarro, roughness: 0.3})
  );
  chasis.position.y = 0.5;
  cocheGrupo.add(chasis);

  const cabina = new THREE.Mesh(
    new THREE.BoxGeometry(2.0, 0.6, 2.2),
    new THREE.MeshStandardMaterial({color: 0x222222, roughness: 0.2})
  );
  cabina.position.set(0, 1.1, -0.2);
  cocheGrupo.add(cabina);

  const cristal = new THREE.Mesh(
    new THREE.BoxGeometry(1.9, 0.4, 0.1),
    new THREE.MeshStandardMaterial({color: 0x99ccff, transparent: true, opacity: 0.6})
  );
  cristal.position.set(0, 1.1, -1.35);
  cocheGrupo.add(cristal);

  const ruedaGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.4, 12);
  const ruedaMat = new THREE.MeshStandardMaterial({color: 0x111111, roughness: 0.9});
  
  const posicionesRuedas = [
    [-1.3, 0.4, 1.2],
    [1.3, 0.4, 1.2],
    [-1.3, 0.4, -1.2],
    [1.3, 0.4, -1.2]
  ];

  cocheGrupo.ruedas = [];
  posicionesRuedas.forEach(pos => {
    const r = new THREE.Mesh(ruedaGeo, ruedaMat);
    r.rotation.z = Math.PI / 2;
    r.position.set(pos[0], pos[1], pos[2]);
    cocheGrupo.add(r);
    cocheGrupo.ruedas.push(r);
  });

  return cocheGrupo;
}

// --- GENERACIÓN DE OBSTÁCULOS DIFERENTES Y VARIADOS ---
function crearObstaculoVisual(tipo) {
  const grupo = new THREE.Group();
  if (tipo === 0) {
    // Tipo Barrera / Valla de tráfico (Rayas blancas y naranjas)
    const base = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.5, 0.5), new THREE.MeshStandardMaterial({color: 0xff5500}));
    base.position.y = 1.2;
    const pata1 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.5, 0.3), new THREE.MeshStandardMaterial({color: 0x333333}));
    pata1.position.set(-1.4, 0.75, 0);
    const pata2 = pata1.clone();
    pata2.position.x = 1.4;
    grupo.add(base, pata1, pata2);
  } else if (tipo === 1) {
    // Tipo Cono de tráfico estilizado
    const geoCil = new THREE.CylinderGeometry(0.1, 0.9, 2.0, 8);
    const matCono = new THREE.MeshStandardMaterial({color: 0xff3300});
    const cono = new THREE.Mesh(geoCil, matCono);
    cono.position.y = 1.0;
    const baseCono = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.2, 1.5), new THREE.MeshStandardMaterial({color: 0x111111}));
    baseCono.position.y = 0.1;
    grupo.add(cono, baseCono);
  } else {
    // Tipo Neumáticos apilados / Barrera protectora
    const tGeo = new THREE.CylinderGeometry(1.0, 1.0, 0.6, 10);
    const tMat = new THREE.MeshStandardMaterial({color: 0x222222, roughness: 0.9});
    const n1 = new THREE.Mesh(tGeo, tMat); n1.position.y = 0.3; n1.rotation.x = Math.PI/2;
    const n2 = new THREE.Mesh(tGeo, tMat); n2.position.y = 0.9; n2.rotation.x = Math.PI/2; n2.position.x = 0.2;
    const n3 = new THREE.Mesh(tGeo, tMat); n3.position.y = 1.5; n3.rotation.x = Math.PI/2;
    grupo.add(n1, n2, n3);
  }
  return grupo;
}

let player = new THREE.Group();
scene.add(player);

camera.position.set(0, 8, 12);

let started = false, lives = 3, points = 0, dificultadVelocidad = 0;
let record = localStorage.getItem("ryc_record") || 0;
document.getElementById("record").textContent = record;

// Reducimos la cantidad inicial de obstáculos drásticamente (de 80 a 25) para que no esté saturado al inicio
const totalObstaculosDisponibles = 25;
const obstacles = [];
for(let i=0; i<totalObstaculosDisponibles; i++){
 const tipoAleatorio = Math.floor(Math.random() * 3);
 const o = crearObstaculoVisual(tipoAleatorio);
 // Los esparcimos inicialmente a lo largo del camino lejano
 o.position.set((Math.random()*(roadWidth-10)) - (roadWidth-10)/2, 0, -150 - i*80);
 // Propiedad personalizada para saber su índice de aparición
 o.idObstaculo = i; 
 scene.add(o);
 obstacles.push(o);
}

const bots = [];
for(let i=0; i<4; i++){ // Reducido ligeramente el número de bots iniciales para balancear
 const botColor = Math.random() * 0xffffff;
 const bot = crearVehiculo(botColor);
 bot.position.set((Math.random()*40)-20, 0, -100-i*60);
 scene.add(bot);
 bots.push(bot);
}

const keys = {}, touch = {};
onkeydown = e => keys[e.key] = true;
onkeyup = e => keys[e.key] = false;

// Configuración de controles móviles mejorada contra clics largos molestos
["left", "up", "right"].forEach(id => {
 const el = document.getElementById(id);
 if(el){
   // ontouchstart activa el movimiento e impide el comportamiento por defecto de Android/iOS (menús)
   el.addEventListener('touchstart', e => {
     e.preventDefault(); 
     touch[id] = true;
   }, {passive: false});
   
   el.addEventListener('touchend', e => {
     e.preventDefault();
     touch[id] = false;
   }, {passive: false});

   el.addEventListener('touchcancel', e => {
     e.preventDefault();
     touch[id] = false;
   }, {passive: false});
 }
});

function startGame(){
 const mapa = document.getElementById("mapa").value;
 const colorSeleccionado = parseInt(document.getElementById("colorCarro").value);

 if(mapa === "noche") {
   scene.background = new THREE.Color(0x050515);
   scene.fog = new THREE.FogExp2(0x050515, 0.0015);
   sun.intensity = 0.3;
   lightAmbient.intensity = 0.2;
 } else {
   scene.background = new THREE.Color(0x87ceeb);
   scene.fog = new THREE.FogExp2(0x87ceeb, 0.001);
   sun.intensity = 1.3;
   lightAmbient.intensity = 0.7;
 }

 scene.remove(player);
 player = crearVehiculo(colorSeleccionado);
 scene.add(player);

 document.getElementById("menu").style.display = "none";
 started = true;
 if(audio.src) {
    audio.currentTime = 0;
    audio.play().catch(e => console.log("Audio listo esperando interacción."));
 }
}

function gameOver(motivo) {
  started = false;
  
  if(audio.src) {
    audio.pause();
    audio.currentTime = 0;
  }

  if(points > record){
    record = points;
    localStorage.setItem("ryc_record", record);
    document.getElementById("record").textContent = record;
  }

  document.getElementById("motivoMuerte").textContent = motivo;
  document.getElementById("ptsFinal").textContent = points;
  document.getElementById("gameover").style.display = "flex";
}

function reiniciarJuego() {
  lives = 3;
  points = 0;
  dificultadVelocidad = 0;
  document.getElementById("lives").textContent = lives;
  document.getElementById("pts").textContent = points;
  document.getElementById("gameover").style.display = "none";
  
  player.position.set(0, 0, 0);

  obstacles.forEach((o, i) => {
    o.position.set((Math.random()*(roadWidth-10)) - (roadWidth-10)/2, 0, -150-i*80);
  });

  bots.forEach((b, i) => {
    b.position.set((Math.random()*40)-20, 0, -100-i*60);
  });

  document.getElementById("menu").style.display = "flex";
}

function animate(){
 requestAnimationFrame(animate);
 if(started){
   // Dificultad progresiva basada en puntos
   dificultadVelocidad = Math.min(points / 250, 2.0); 

   if(keys.ArrowLeft || touch.left) {
     player.position.x -= 0.40; // Movimiento ligeramente más responsivo
   }
   if(keys.ArrowRight || touch.right) {
     player.position.x += 0.40;
   }
   if(keys.ArrowUp || touch.up) {
     points += 1;
   }

   if(player.ruedas) {
     player.ruedas.forEach(r => r.rotation.x += 0.25);
   }

   if(Math.abs(player.position.x) > (roadWidth / 2)) {
     gameOver("¡Te saliste de la pista a alta velocidad! 🏎️💨");
   }

   // Lógica de Obstáculos con Complejidad Progresiva
   obstacles.forEach(o=>{
    // Lógica de "Complejidad/Spawning Progresivo": 
    // Al principio (pocos puntos), sólo se mueven los primeros obstáculos. Los demás se quedan atrás hasta que subes de puntaje.
    if (points < 50 && o.idObstaculo > 8) {
      // Ocultar temporalmente manteniéndolo lejos
      return;
    }
    if (points < 150 && o.idObstaculo > 16) {
      return;
    }

    // Movimiento hacia el jugador acelerado por la dificultad
    o.position.z += (2.4 + dificultadVelocidad);
    
    if(o.position.z > 20){
      o.position.z = -2000; 
      o.position.x = (Math.random()*(roadWidth-12)) - (roadWidth-12)/2;
      points += 5;
    }
    
    // Caja de colisión adaptada al tamaño del obstáculo
    if(Math.abs(o.position.x - player.position.x) < 2.4 && Math.abs(o.position.z - player.position.z) < 2.2){
       lives--;
       o.position.z = -2000;
       document.getElementById("lives").textContent = lives;
    }
   });

   // Bots Rivales
   bots.forEach(b=>{
    b.position.z += (2.1 + dificultadVelocidad);
    if(b.ruedas) {
      b.ruedas.forEach(r => r.rotation.x += 0.22);
    }

    if(b.position.z > 20) {
      b.position.z = -1200;
      b.position.x = (Math.random()*(roadWidth-10)) - (roadWidth-10)/2;
    }

    if(Math.abs(b.position.x - player.position.x) < 2.2 && Math.abs(b.position.z - player.position.z) < 3.2){
       lives--;
       b.position.z = -1200;
       document.getElementById("lives").textContent = lives;
    }
   });

   if(lives <= 0){
      gameOver("Te quedaste sin vidas por tantos choques. 🛠️");
   }

   document.getElementById("pts").textContent = points;
   camera.position.x = player.position.x * 0.95;
   camera.lookAt(player.position.x, 2, -40);
 }
 renderer.render(scene, camera);
}
animate();

window.addEventListener('resize',()=>{
 camera.aspect = window.innerWidth/window.innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
